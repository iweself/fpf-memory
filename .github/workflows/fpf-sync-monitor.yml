name: FPF Sync Monitor

on:
  schedule:
    # Hourly sentinel. sync-fpf.yml is the worker; this workflow is the SLO monitor
    # and recovery trigger when upstream changed but no dispatch arrived.
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      max_drift_hours:
        description: 'Allowed upstream-to-fpf.sh drift before this monitor fails'
        required: false
        default: '10'

permissions:
  actions: write
  contents: read
  pull-requests: read

concurrency:
  group: fpf-sync-monitor
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.5'
  FPF_SYNC_MONITOR_STATUS_URL: https://fpf.sh/api/fpf/status
  FPF_SYNC_MONITOR_MAX_DRIFT_HOURS: ${{ github.event.inputs.max_drift_hours || '10' }}

jobs:
  monitor:
    name: Check fpf.sh sync SLO
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Evaluate hosted sync health
        id: monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run monitor:sync -- --format markdown

      - name: Check for existing target sync PR
        id: open_sync_pr
        if: steps.monitor.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          TARGET_BRANCH: chore/sync-fpf-${{ steps.monitor.outputs.upstream_short_ref }}
        run: |
          set -euo pipefail

          PR_NUMBER="$(
            gh pr list \
              --state open \
              --head "$TARGET_BRANCH" \
              --json number,author,baseRefName,body,headRepositoryOwner,isCrossRepository |
            jq -r --arg owner "$REPO_OWNER" '
              [
                .[]
                | select(.baseRefName == "main")
                | select(.isCrossRepository == false)
                | select(.headRepositoryOwner.login == $owner)
                | select(.author.login == "app/github-actions")
                | select((.body // "") | contains("Generated by `.github/workflows/sync-fpf.yml`."))
              ]
              | first
              | .number // empty
            '
          )"

          if [ -n "$PR_NUMBER" ]; then
            echo "target_exists=true" >> "$GITHUB_OUTPUT"
            echo "Sync PR #$PR_NUMBER already exists for $TARGET_BRANCH; a worker retry can recheck merge eligibility."
          else
            echo "target_exists=false" >> "$GITHUB_OUTPUT"
            echo "No automation-owned open sync PR exists for $TARGET_BRANCH."
          fi

      - name: Check for active sync worker
        id: active_sync_worker
        if: steps.monitor.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ACTIVE_RUN="$(
            gh run list \
              --workflow sync-fpf.yml \
              --limit 20 \
              --json databaseId,status,url |
            jq -r '
              [
                .[]
                | select(
                  .status == "queued"
                  or .status == "in_progress"
                  or .status == "waiting"
                  or .status == "pending"
                  or .status == "requested"
                )
              ]
              | first
              | if . == null then "" else "\(.databaseId)\t\(.status)\t\(.url)" end
            '
          )"

          if [ -n "$ACTIVE_RUN" ]; then
            IFS=$'\t' read -r run_id run_status run_url <<< "$ACTIVE_RUN"
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "Sync worker run $run_id is $run_status: $run_url"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "No active sync worker run found; dispatch can open or retry the current sync PR."
          fi

      - name: Trigger guarded publication sync
        if: steps.monitor.outputs.needs_sync == 'true' && steps.active_sync_worker.outputs.active != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REF: ${{ steps.monitor.outputs.upstream_ref }}
        run: gh workflow run sync-fpf.yml --ref main -f upstream_ref="$UPSTREAM_REF"

      - name: Enforce sync SLO
        if: steps.monitor.outputs.breached == 'true'
        run: |
          echo "::error::${{ steps.monitor.outputs.summary }}"
          exit 1
