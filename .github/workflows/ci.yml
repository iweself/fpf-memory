name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      - name: Validate published/current coherence
        # The publication surface is owned by the local pre-push hook
        # (`bun run publish:current`). CI never regenerates it. If the
        # committed tree is missing or internally inconsistent, the
        # commit skipped or corrupted the publish step — fail here so the
        # broken push doesn't reach the deploy job.
        run: bun run validate:published

      - name: Lint
        run: bun run lint

      - name: Boundary check
        run: bun run check:boundaries

      - name: Type check
        run: bun run check

      - name: Test
        # Run the CI suite in four fresh Rstest processes. The full FPF suite
        # can push a single long-lived worker over the GitHub runner memory
        # cliff even with `maxWorkers: 1`.
        run: bun run test:ci

      - name: Build docs
        run: bun run docs:build

      - name: Build MCP bundle
        run: bun run build:mcp

      - name: Stage + mastra build (deploy dry-run)
        # Assemble the deploy bundle without uploading. Catches packaging
        # regressions (missing hosted files, broken `mastra build`) on
        # every PR without requiring deploy credentials.
        run: |
          bun run stage:from-published
          bun run mastra:build
          test -f .mastra/output/index.mjs
          test -f .mastra/output/hosted/FPF-Spec.md
          test -f .mastra/output/hosted/fpf-index/snapshot.json
