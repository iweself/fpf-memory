name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # PRs share a group per PR number so a follow-up commit cancels the prior
  # run. Pushes to `main` use the SHA so every commit gets its own group —
  # otherwise GitHub's per-group queue (only one pending run is kept) would
  # silently discard intermediate `main` commits when they land faster than
  # CI can start, even with `cancel-in-progress: false`.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Single source of truth for the bun toolchain version. Used by setup-bun
  # in every job and baked into the cache key so a version bump invalidates
  # incompatible node_modules caches.
  BUN_VERSION: '1.3.5'
  VERCEL_FUNCTION_BUNDLE_PATH: .vercel/output/functions/_origin.func

jobs:
  setup:
    name: Install + validate published
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - id: cache-key
        # Include the bun version + runner arch so toolchain bumps and
        # cross-arch runners don't restore an incompatible node_modules.
        run: echo "key=bun-${{ env.BUN_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ steps.cache-key.outputs.key }}

      - run: bun install --frozen-lockfile

      - name: Validate published/current coherence
        # The publication surface is owned by the local pre-push hook and
        # the Sync FPF Publication workflow. CI never regenerates it. If
        # the committed tree is missing or internally inconsistent, fail
        # here so the broken push doesn't reach the deploy jobs.
        run: bun run validate:published

      - name: Monitor generated and curated content quality
        # Validate the committed publication projection before build jobs.
        # This catches stale route selectors in curated pages and route catalog
        # holes against the same published snapshot the deploy will serve.
        run: bun run monitor:content -- --mode local --format markdown --fail-on-breach

  lint:
    name: Lint + boundaries
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run check:boundaries

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: bun install --frozen-lockfile
      - run: bun run check

  test:
    name: Test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15
    strategy:
      # Surface every failing shard, don't mask 2-4 because shard 1 broke.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: bun install --frozen-lockfile
      # Run one shard per runner, then split that shard into one Rstest
      # process per file. The full FPF suite includes docs and runtime index
      # builds; keeping each file in a fresh process prevents late-shard worker
      # exits from accumulated test-runner state while preserving failure
      # visibility.
      - name: Run test shard
        run: bun scripts/run-test-shard.ts --shard=${{ matrix.shard }}/4

  build:
    name: Build (docs + MCP + Vercel origin dry-run)
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: bun install --frozen-lockfile
      - run: bun run docs:build
      - run: bun run build:mcp
      - name: Build Vercel origin bundle without uploading
        # Assemble the Vercel Build Output API bundle without uploading.
        # Catches packaging regressions on every PR without requiring
        # deploy credentials.
        run: |
          bun run vercel:origin:build
          test -d "$VERCEL_FUNCTION_BUNDLE_PATH"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/index.mjs"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/hosted/FPF-Spec.md"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/hosted/manifest.json"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/hosted/fpf-index/snapshot.json"
          test -f .vercel/output/static/index.html
          test -f .vercel/output/static/start-here.html
          test -f .vercel/output/static/generated/patterns/A.6.9.html

  # Single green check for branch protection: this is the only required
  # status. It goes green iff every parallel job above succeeded. The job
  # ID stays `ci` (no `name:` override) so the status-check context
  # remains `CI / ci`, matching existing branch-protection rules.
  ci:
    runs-on: ubuntu-latest
    needs: [setup, lint, typecheck, test, build]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        # Require every dependency result to be exactly `success`. Checking
        # only for `failure`/`cancelled` would let a `skipped` result slip
        # through as green if a future change adds an `if:` to a job.
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Required job results: $results"
          IFS=','
          for r in $results; do
            if [[ "$r" != "success" ]]; then
              echo "::error::A required job did not succeed (got: '$r')."
              exit 1
            fi
          done
