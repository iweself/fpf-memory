name: Deploy MCP to Mastra Cloud

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Newer deploys supersede older queued/in-flight runs.
concurrency:
  group: deploy-mcp
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.guard.outputs.should_deploy }}
      deploy_sha: ${{ steps.guard.outputs.deploy_sha }}
    steps:
      - id: guard
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CURRENT_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "deploy_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$WORKFLOW_RUN_CONCLUSION" != "success" ] || [ "$WORKFLOW_RUN_EVENT" != "push" ] || [ "$WORKFLOW_RUN_HEAD_BRANCH" != "main" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "deploy_sha=$WORKFLOW_RUN_HEAD_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_main_sha="$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
            | jq -r '.object.sha')"

          echo "Latest main SHA: $latest_main_sha"
          echo "CI head SHA: $WORKFLOW_RUN_HEAD_SHA"

          if [ "$WORKFLOW_RUN_HEAD_SHA" != "$latest_main_sha" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "deploy_sha=$WORKFLOW_RUN_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy because CI succeeded on a stale main SHA."
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$WORKFLOW_RUN_HEAD_SHA" >> "$GITHUB_OUTPUT"

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Automatic deploys only run after the `CI` workflow succeeds on a
    # push to `main`. `workflow_dispatch` remains available as an explicit
    # maintainer override.
    if: needs.guard.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.deploy_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      - name: Validate published/current coherence
        run: bun run validate:published

      - name: Stage hosted bundle from published/current
        run: bun run stage:from-published

      - name: Build Mastra bundle
        run: bun run mastra:build

      - name: Write .mastra-project.json for headless deploy
        # `mastra server deploy` needs an org + project binding. Local
        # dev gets it from the gitignored .mastra-project.json that
        # `mastra login` drops; CI materializes the same file from
        # repository variables so we don't have to un-ignore it or
        # rename the secret the user already provisioned.
        env:
          MASTRA_ORG_ID: ${{ vars.MASTRA_ORG_ID }}
          MASTRA_PROJECT_ID: ${{ vars.MASTRA_PROJECT_ID }}
          MASTRA_PROJECT_SLUG: ${{ vars.MASTRA_PROJECT_SLUG }}
          MASTRA_PROJECT_NAME: ${{ vars.MASTRA_PROJECT_NAME }}
        run: |
          if [ -z "$MASTRA_ORG_ID" ] || [ -z "$MASTRA_PROJECT_ID" ]; then
            echo "Missing MASTRA_ORG_ID / MASTRA_PROJECT_ID repository variables." >&2
            echo "Set them under Settings > Secrets and variables > Actions > Variables." >&2
            exit 1
          fi
          jq -n \
            --arg orgId   "$MASTRA_ORG_ID" \
            --arg projId  "$MASTRA_PROJECT_ID" \
            --arg slug    "${MASTRA_PROJECT_SLUG:-fpf-memory}" \
            --arg name    "${MASTRA_PROJECT_NAME:-fpf-memory}" \
            '{projectId: $projId, projectName: $name, projectSlug: $slug, organizationId: $orgId}' \
            > .mastra-project.json

      - name: Deploy to Mastra Cloud
        timeout-minutes: 8
        env:
          # The Mastra CLI reads `MASTRA_API_TOKEN` in headless mode.
          # The existing repo secret is `MASTRA_KEY` — remap at the
          # env boundary so we don't have to rename the secret.
          MASTRA_API_TOKEN: ${{ secrets.MASTRA_KEY }}
          MASTRA_ORG_ID: ${{ vars.MASTRA_ORG_ID }}
          MASTRA_PROJECT_ID: ${{ vars.MASTRA_PROJECT_ID }}
        run: bun run mastra:deploy -- --yes
