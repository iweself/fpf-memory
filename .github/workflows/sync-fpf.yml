name: Sync FPF Publication

# Polls the canonical FPF spec at github.com/ailev/FPF (Anatoly
# Levenchuk's repository, the original source) once a day. If the
# upstream main HEAD differs from `published/current/manifest.json`,
# rebuilds the snapshot, opens a PR, and lets the normal CI pipeline
# (lint, type, tests, build, Vercel preview, Playwright E2E) gate the
# merge. After a two-hour review window, the workflow merges the PR
# only if every reported check/status is passing. The merge then
# triggers Vercel's prod deploy via the Git integration.
#
# Earlier versions auto-pushed to main; that was changed to PR mode
# because upstream-spec changes are higher-risk than human PRs (no
# author review, content can change parser behavior). PR mode keeps
# the same E2E gates that protect every other change to main.
on:
  schedule:
    # Daily at 06:00 UTC (~02:00 EST / 23:00 PST). Off-peak for both
    # GitHub Actions runners and the delayed Vercel deploy that follows merge.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'ailev/FPF branch, tag, or commit SHA to publish'
        required: false
        default: 'main'

permissions:
  actions: write
  contents: write
  pull-requests: write

# A single sync at a time. If a manual run starts mid-cron, the cron
# waits — we don't want two jobs racing on `published/current/`.
concurrency:
  group: sync-fpf
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.5'
  VERCEL_FUNCTION_BUNDLE_PATH: .vercel/output/functions/_origin.func

jobs:
  refresh:
    name: Refresh published/current from ailev/FPF
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Download upstream spec from ailev/FPF
        run: bun run spec:download

      - name: Publish current channel
        env:
          FPF_PUBLISH_SOURCE_PATH: .fpf-upstream/FPF-Spec.md
          FPF_UPSTREAM_REF: ${{ inputs.upstream_ref || 'main' }}
        run: bun run publish:current

      - name: Validate published surface
        run: bun run validate:published

      - name: Build hosted MCP server bundle
        run: |
          bun run vercel:origin:build
          test -d "$VERCEL_FUNCTION_BUNDLE_PATH"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/index.mjs"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/hosted/FPF-Spec.md"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/hosted/manifest.json"
          test -f "$VERCEL_FUNCTION_BUNDLE_PATH/hosted/fpf-index/snapshot.json"

      - name: Detect upstream change
        id: detect
        run: |
          set -euo pipefail
          # Stage the publication surface; if nothing changed,
          # the rest of the steps can short-circuit.
          git add published/current/FPF-Spec.md \
                  published/current/fpf-index/snapshot.json \
                  published/current/manifest.json \
                  src/docs/generated-search-id-registry.ts

          if git diff --cached --quiet; then
            echo "published/current already represents ailev/FPF HEAD; nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            git reset HEAD -- . || true
            exit 0
          fi

          UPSTREAM_REF=$(jq -r .upstreamRef published/current/manifest.json)
          UPSTREAM_DATE=$(jq -r .upstreamCommittedAt published/current/manifest.json)
          {
            echo "changed=true"
            echo "upstream_ref=$UPSTREAM_REF"
            echo "short_ref=${UPSTREAM_REF:0:8}"
            echo "short_date=${UPSTREAM_DATE:0:10}"
          } >> "$GITHUB_OUTPUT"

          # Reset the staged files so peter-evans/create-pull-request
          # can stage + commit on its own branch.
          git reset HEAD -- .

      - name: Open sync PR
        if: steps.detect.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-fpf-${{ steps.detect.outputs.short_ref }}
          delete-branch: true
          base: main
          commit-message: |
            publish: sync FPF spec from ailev/FPF (${{ steps.detect.outputs.short_ref }} · ${{ steps.detect.outputs.short_date }})
          title: 'chore: sync FPF spec from ailev/FPF (${{ steps.detect.outputs.short_date }})'
          body: |
            Auto-detected new commit on `ailev/FPF` main.

            - **Upstream commit**: [`${{ steps.detect.outputs.upstream_ref }}`](https://github.com/ailev/FPF/commit/${{ steps.detect.outputs.upstream_ref }})
            - **Author date**: ${{ steps.detect.outputs.short_date }}

            CI gates this merge: lint, type, tests, hosted MCP build, Vercel preview deploy, and Playwright E2E. After a two-hour review window, the sync workflow will merge this PR automatically if every reported check/status is passing.

            > Generated by `.github/workflows/sync-fpf.yml`. Failed or still-pending checks leave this PR open for manual review.
          add-paths: |
            published/current/FPF-Spec.md
            published/current/fpf-index/snapshot.json
            published/current/manifest.json
            src/docs/generated-search-id-registry.ts
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'

      - name: Trigger CI for sync PR branch
        if: steps.detect.outputs.changed == 'true' && steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_BRANCH: chore/sync-fpf-${{ steps.detect.outputs.short_ref }}
        run: gh workflow run ci.yml --ref "$SYNC_BRANCH"

      - name: Merge sync PR after two-hour review window
        if: steps.detect.outputs.changed == 'true' && steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail

          echo "Opened sync PR #$PR_NUMBER; waiting two hours before merge eligibility check."
          sleep 7200

          PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq .state)
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "Sync PR #$PR_NUMBER is $PR_STATE; nothing to merge."
            exit 0
          fi

          CHECKS_JSON=$(gh pr checks "$PR_NUMBER" --json name,bucket,state,link)
          CHECK_COUNT=$(jq 'length' <<<"$CHECKS_JSON")
          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "::warning::No checks reported for PR #$PR_NUMBER after the two-hour window; leaving it open."
            exit 0
          fi

          REQUIRED_CHECK_NAMES='["ci","Vercel","Playwright on Vercel preview"]'
          MISSING_REQUIRED=$(jq --argjson required "$REQUIRED_CHECK_NAMES" '
            ($required - [.[] | select(.bucket == "pass") | .name])
          ' <<<"$CHECKS_JSON")
          MISSING_REQUIRED_COUNT=$(jq 'length' <<<"$MISSING_REQUIRED")
          if [ "$MISSING_REQUIRED_COUNT" -ne 0 ]; then
            echo "::warning::PR #$PR_NUMBER is missing required passing checks after the two-hour window; leaving it open."
            jq -r '.[] | "- missing or not passing: \(.)"' <<<"$MISSING_REQUIRED"
            exit 0
          fi

          NOT_READY=$(jq '[.[] | select(.bucket != "pass" and .bucket != "skipping")]' <<<"$CHECKS_JSON")
          NOT_READY_COUNT=$(jq 'length' <<<"$NOT_READY")
          if [ "$NOT_READY_COUNT" -ne 0 ]; then
            echo "::warning::PR #$PR_NUMBER is not eligible for auto-merge; leaving it open."
            jq -r '.[] | "- \(.name): \(.bucket) (\(.state)) \(.link // "")"' <<<"$NOT_READY"
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --squash --delete-branch

      - name: Report result
        run: |
          if [ "${{ steps.detect.outputs.changed }}" = "true" ]; then
            echo "Opened sync PR #${{ steps.pr.outputs.pull-request-number }}"
            echo "${{ steps.pr.outputs.pull-request-url }}"
          else
            echo "No upstream change detected; nothing to do."
          fi
