name: Sync FPF Publication

# Tracks the original FPF spec at github.com/ailev/FPF. This is the publication
# worker. `fpf-sync-monitor.yml` is the scheduled freshness sentinel;
# repository_dispatch is available for any upstream notifier that can send
# `fpf-origin-updated`. If the resolved upstream ref
# differs from `published/current/manifest.json`, this workflow rebuilds the
# snapshot, opens a PR, and lets the normal CI pipeline gate the merge. After
# a two-hour review window, the workflow merges the PR only if every reported
# check/status is passing. The workflow then deploys the website and MCP
# production bundles through the repo CLI scripts so both Vercel surfaces are
# tied to the merged commit.
#
# Earlier versions auto-pushed to main; that was changed to PR mode
# because upstream-spec changes are higher-risk than human PRs (no
# author review, content can change parser behavior). PR mode keeps
# the same E2E gates that protect every other change to main.
on:
  repository_dispatch:
    types: [fpf-origin-updated, fpf-sync-updated]
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'ailev/FPF branch, tag, or commit SHA to publish'
        required: false
        default: ''
      spec_url:
        description: 'Optional raw FPF-Spec.md URL; requires upstream_ref for provenance'
        required: false
        default: ''

permissions:
  actions: write
  contents: write
  pull-requests: write

# A single sync at a time. If a manual or monitor-triggered run overlaps
# another sync, the later run waits so two jobs do not race on `published/current/`.
concurrency:
  group: sync-fpf
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.5'
  FPF_UPSTREAM_OWNER: ailev
  FPF_UPSTREAM_REPO: FPF
  FPF_UPSTREAM_SPEC_PATH: FPF-Spec.md
  VERCEL_MCP_FUNCTION_BUNDLE_PATH: .vercel/output/functions/_mcp.func

jobs:
  refresh:
    name: Refresh published/current from ailev/FPF
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Resolve upstream input
        id: upstream
        env:
          PAYLOAD_SHA: ${{ github.event.client_payload.sha || github.event.client_payload.after || '' }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref || github.event.client_payload.branch || '' }}
          PAYLOAD_SPEC_URL: ${{ github.event.client_payload.spec_url || '' }}
          MANUAL_REF: ${{ github.event.inputs.upstream_ref || '' }}
          MANUAL_SPEC_URL: ${{ github.event.inputs.spec_url || '' }}
        run: |
          set -euo pipefail

          UPSTREAM_REF="${PAYLOAD_SHA:-${PAYLOAD_REF:-$MANUAL_REF}}"
          SPEC_URL="${PAYLOAD_SPEC_URL:-$MANUAL_SPEC_URL}"

          if [ -n "$SPEC_URL" ] && [ -z "$UPSTREAM_REF" ]; then
            echo "::error::spec_url requires client_payload.sha/after/ref/branch or manual upstream_ref so manifest provenance is verifiable."
            exit 1
          fi

          if [ -z "$UPSTREAM_REF" ]; then
            UPSTREAM_REF="main"
          fi
          UPSTREAM_REF="${UPSTREAM_REF#refs/heads/}"
          UPSTREAM_REF="${UPSTREAM_REF#refs/tags/}"

          {
            echo "ref=$UPSTREAM_REF"
            echo "spec_url=$SPEC_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Download upstream spec from ailev/FPF
        env:
          FPF_UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
          FPF_UPSTREAM_SPEC_URL: ${{ steps.upstream.outputs.spec_url }}
        run: bun run spec:download

      - name: Publish current channel
        env:
          FPF_PUBLISH_SOURCE_PATH: .fpf-upstream/FPF-Spec.md
          FPF_UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: bun run publish:current

      - name: Validate published surface
        run: bun run validate:published

      - name: Build website and hosted MCP deployment bundles
        run: |
          bun run vercel:website:build
          test -f .vercel/output/static/index.html
          test -f .vercel/output/static/fpf-publication-manifest.json
          test -f .vercel/output/static/generated/patterns/A.6.9.html
          test ! -d .vercel/output/functions

          bun run vercel:mcp:build
          test -d "$VERCEL_MCP_FUNCTION_BUNDLE_PATH"
          test -f "$VERCEL_MCP_FUNCTION_BUNDLE_PATH/index.mjs"
          test -f "$VERCEL_MCP_FUNCTION_BUNDLE_PATH/hosted/FPF-Spec.md"
          test -f "$VERCEL_MCP_FUNCTION_BUNDLE_PATH/hosted/manifest.json"
          test -f "$VERCEL_MCP_FUNCTION_BUNDLE_PATH/hosted/fpf-index/snapshot.json"
          test -f .vercel/output/static/legacy-mcp-gone.json
          test "$(ls -A .vercel/output/static)" = "legacy-mcp-gone.json"

      - name: Detect upstream change
        id: detect
        run: |
          set -euo pipefail
          # Stage the publication surface; if nothing changed,
          # the rest of the steps can short-circuit.
          git add published/current/FPF-Spec.md \
                  published/current/fpf-index/snapshot.json \
                  published/current/manifest.json \
                  src/docs/generated-search-id-registry.ts

          if git diff --cached --quiet; then
            echo "published/current already represents ailev/FPF ${{ steps.upstream.outputs.ref }}; nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            UPSTREAM_REF=$(jq -r .upstreamRef published/current/manifest.json)
            {
              echo "upstream_ref=$UPSTREAM_REF"
              echo "short_ref=${UPSTREAM_REF:0:8}"
            } >> "$GITHUB_OUTPUT"
            git reset HEAD -- . || true
            exit 0
          fi

          UPSTREAM_REF=$(jq -r .upstreamRef published/current/manifest.json)
          UPSTREAM_REPO_URL=$(jq -r .upstreamRepoUrl published/current/manifest.json)
          UPSTREAM_REPO_LABEL="${UPSTREAM_REPO_URL#https://github.com/}"
          UPSTREAM_DATE=$(jq -r .upstreamCommittedAt published/current/manifest.json)
          {
            echo "changed=true"
            echo "upstream_ref=$UPSTREAM_REF"
            echo "upstream_repo_url=$UPSTREAM_REPO_URL"
            echo "upstream_repo_label=$UPSTREAM_REPO_LABEL"
            echo "short_ref=${UPSTREAM_REF:0:8}"
            echo "short_date=${UPSTREAM_DATE:0:10}"
          } >> "$GITHUB_OUTPUT"

          # Reset the staged files so peter-evans/create-pull-request
          # can stage + commit on its own branch.
          git reset HEAD -- .

      - name: Repair production deploy when published/current is already current
        if: steps.detect.outputs.changed == 'false' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          FPF_VERCEL_SCOPE: team_CnO1I5xd2OS0lzbbc4RkW7Ym
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::warning::VERCEL_TOKEN is not configured; cannot repair production deployment from no-change sync run."
            exit 0
          fi

          SYNC_OK=false
          CONTENT_OK=false
          if bun run monitor:sync -- --format markdown --fail-on-breach; then
            SYNC_OK=true
          fi
          if bun run monitor:content -- --mode live --format markdown --fail-on-breach; then
            CONTENT_OK=true
          fi

          if [ "$SYNC_OK" = "true" ] && [ "$CONTENT_OK" = "true" ]; then
            echo "Production website and MCP status are coherent for the current published surface; no repair deploy needed."
            exit 0
          fi

          echo "::warning::Production monitor failed while published/current has no upstream diff; redeploying website and MCP surfaces."
          bun run deploy:prod
          bun run monitor:sync -- --format markdown --fail-on-breach
          bun run monitor:content -- --mode live --format markdown --fail-on-breach

      - name: Close superseded sync PRs
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          TARGET_BRANCH: chore/sync-fpf-${{ steps.detect.outputs.short_ref }}
        run: |
          set -euo pipefail

          gh pr list \
            --state open \
            --json number,author,baseRefName,body,headRefName,headRepositoryOwner,isCrossRepository,url |
          jq -r --arg owner "$REPO_OWNER" --arg target "$TARGET_BRANCH" '
            .[]
            | select(.headRefName | startswith("chore/sync-fpf-"))
            | select(.headRefName != $target)
            | select(.baseRefName == "main")
            | select(.isCrossRepository == false)
            | select(.headRepositoryOwner.login == $owner)
            | select(.author.login == "app/github-actions")
            | select((.body // "") | contains("Generated by `.github/workflows/sync-fpf.yml`."))
            | [.number, .headRefName, .url]
            | @tsv
          ' |
          while IFS=$'\t' read -r number head_ref url; do
            if [ -z "$number" ]; then
              continue
            fi

            COMMENT="Closing as superseded by the current publication sync target \`$TARGET_BRANCH\`."

            echo "Closing superseded sync PR $url ($head_ref)."
            if ! gh pr close "$number" --comment "$COMMENT"; then
              echo "::warning::Failed to close superseded sync PR $url."
            fi
          done

      - name: Open sync PR
        if: steps.detect.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-fpf-${{ steps.detect.outputs.short_ref }}
          delete-branch: true
          base: main
          commit-message: |
            publish: sync FPF spec from ${{ steps.detect.outputs.upstream_repo_label }} (${{ steps.detect.outputs.short_ref }} · ${{ steps.detect.outputs.short_date }})
          title: 'chore: sync FPF spec from ${{ steps.detect.outputs.upstream_repo_label }} (${{ steps.detect.outputs.short_date }})'
          body: |
            Auto-detected new commit on `${{ steps.detect.outputs.upstream_repo_label }}`.

            - **Upstream commit**: [`${{ steps.detect.outputs.upstream_ref }}`](${{ steps.detect.outputs.upstream_repo_url }}/commit/${{ steps.detect.outputs.upstream_ref }})
            - **Author date**: ${{ steps.detect.outputs.short_date }}

            CI gates this merge: lint, type, tests, website/MCP deployment dry-runs, Vercel preview deploy, and Playwright E2E. After a two-hour review window, the sync workflow will merge this PR automatically if every reported check/status is passing.

            > Generated by `.github/workflows/sync-fpf.yml`. Failed or still-pending checks leave this PR open for manual review.
          add-paths: |
            published/current/FPF-Spec.md
            published/current/fpf-index/snapshot.json
            published/current/manifest.json
            src/docs/generated-search-id-registry.ts
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'

      - name: Trigger CI for sync PR branch
        if: steps.detect.outputs.changed == 'true' && steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_BRANCH: chore/sync-fpf-${{ steps.detect.outputs.short_ref }}
        run: gh workflow run ci.yml --ref "$SYNC_BRANCH"

      - name: Merge sync PR after two-hour review window
        if: steps.detect.outputs.changed == 'true' && steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          FPF_VERCEL_SCOPE: team_CnO1I5xd2OS0lzbbc4RkW7Ym
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail

          # Review window without parking a runner for two hours: exit early when the
          # PR is younger than the window. fpf-sync-monitor runs hourly and re-dispatches
          # this worker while production is still behind upstream (its "worker retry can
          # recheck merge eligibility" path), so eligibility is rechecked each hour until
          # the window elapses — then this step proceeds to the same merge + deploy below.
          REVIEW_WINDOW_SECONDS=7200
          PR_INFO=$(gh pr view "$PR_NUMBER" --json state,createdAt)
          PR_STATE=$(jq -r .state <<<"$PR_INFO")
          PR_CREATED_AT=$(jq -r .createdAt <<<"$PR_INFO")
          PR_AGE_SECONDS=$(( $(date -u +%s) - $(date -u -d "$PR_CREATED_AT" +%s) ))
          if [ "$PR_AGE_SECONDS" -lt "$REVIEW_WINDOW_SECONDS" ]; then
            echo "Sync PR #$PR_NUMBER is ${PR_AGE_SECONDS}s old (< ${REVIEW_WINDOW_SECONDS}s review window); leaving it open. The hourly fpf-sync-monitor will re-dispatch this worker to recheck merge eligibility."
            exit 0
          fi

          if [ "$PR_STATE" != "OPEN" ]; then
            echo "Sync PR #$PR_NUMBER is $PR_STATE; nothing to merge."
            exit 0
          fi

          PR_HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          CI_RUN_JSON=$(gh run list \
            --workflow ci.yml \
            --branch "chore/sync-fpf-${{ steps.detect.outputs.short_ref }}" \
            --json databaseId,headSha,status,conclusion,url \
            --limit 20 \
            --jq "[.[] | select(.headSha == \"$PR_HEAD_SHA\")] | first // empty")
          if [ -z "$CI_RUN_JSON" ]; then
            echo "::warning::No manually triggered CI run found for PR #$PR_NUMBER head $PR_HEAD_SHA; leaving it open."
            exit 0
          fi
          CI_STATUS=$(jq -r .status <<<"$CI_RUN_JSON")
          CI_CONCLUSION=$(jq -r .conclusion <<<"$CI_RUN_JSON")
          if [ "$CI_STATUS" != "completed" ] || [ "$CI_CONCLUSION" != "success" ]; then
            echo "::warning::Manual CI run for PR #$PR_NUMBER is not passing; leaving it open."
            jq -r '"- ci: status=\(.status) conclusion=\(.conclusion) \(.url)"' <<<"$CI_RUN_JSON"
            exit 0
          fi

          CHECKS_JSON=$(gh pr checks "$PR_NUMBER" --json name,bucket,state,link)
          CHECK_COUNT=$(jq 'length' <<<"$CHECKS_JSON")
          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "::warning::No checks reported for PR #$PR_NUMBER after the two-hour window; leaving it open."
            exit 0
          fi

          REQUIRED_CHECK_NAMES='["Build (docs + MCP + Vercel dry-runs)","Vercel","Playwright on Vercel preview"]'
          MISSING_REQUIRED=$(jq --argjson required "$REQUIRED_CHECK_NAMES" '
            ($required - [.[] | select(.bucket == "pass") | .name])
          ' <<<"$CHECKS_JSON")
          MISSING_REQUIRED_COUNT=$(jq 'length' <<<"$MISSING_REQUIRED")
          if [ "$MISSING_REQUIRED_COUNT" -ne 0 ]; then
            echo "::warning::PR #$PR_NUMBER is missing required passing checks after the two-hour window; leaving it open."
            jq -r '.[] | "- missing or not passing: \(.)"' <<<"$MISSING_REQUIRED"
            exit 0
          fi

          NOT_READY=$(jq '[.[] | select(.bucket != "pass" and .bucket != "skipping")]' <<<"$CHECKS_JSON")
          NOT_READY_COUNT=$(jq 'length' <<<"$NOT_READY")
          if [ "$NOT_READY_COUNT" -ne 0 ]; then
            echo "::warning::PR #$PR_NUMBER is not eligible for auto-merge; leaving it open."
            jq -r '.[] | "- \(.name): \(.bucket) (\(.state)) \(.link // "")"' <<<"$NOT_READY"
            exit 0
          fi

          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::warning::VERCEL_TOKEN is not configured; leaving sync PR #$PR_NUMBER open because production deployment cannot be proven."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --squash --delete-branch
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          bun install --frozen-lockfile
          bun run deploy:prod
          bun run monitor:sync -- --format markdown --fail-on-breach
          bun run monitor:content -- --mode live --format markdown --fail-on-breach

      - name: Report result
        run: |
          if [ "${{ steps.detect.outputs.changed }}" = "true" ]; then
            echo "Opened sync PR #${{ steps.pr.outputs.pull-request-number }}"
            echo "${{ steps.pr.outputs.pull-request-url }}"
          else
            echo "No upstream change detected; nothing to do."
          fi
