name: TPR Fast Track

on:
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review, synchronize]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr:
        description: Optional PR number to process
        required: false

permissions:
  checks: read
  contents: read
  issues: write
  pull-requests: write
  statuses: read

concurrency:
  group: tpr-fast-track-${{ github.event.pull_request.number || github.event.inputs.pr || github.event_name }}
  cancel-in-progress: false

jobs:
  tpr-fast-track:
    name: TPR Fast Track
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Run TPR timer
        run: bun scripts/tpr-fast-track.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TPR_FAST_TRACK_PR: ${{ github.event.inputs.pr || '' }}
