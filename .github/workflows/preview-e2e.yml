name: Preview E2E

# Vercel emits `deployment_status` events whenever a preview deploy
# finishes. We listen for those, gate on success + the Preview environment,
# and run Playwright against the auto-generated preview URL. This is the
# automation layer behind PR previews — without it, every PR's preview
# is verified by eyeballs only.
on:
  deployment_status:

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  e2e:
    name: Playwright on Vercel preview
    runs-on: ubuntu-latest
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview' &&
      github.event.deployment_status.environment_url != ''
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      # Cache Playwright browsers between runs to keep the CI step fast.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Chromium for Playwright
        run: bun run test:e2e:install

      - name: Run Playwright suite against preview
        env:
          FPF_E2E_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          # Optional. If the project's Deployment Protection requires a
          # bypass token, generate one in Vercel project settings ("Protection
          # Bypass for Automation") and add it as the repo secret
          # `VERCEL_AUTOMATION_BYPASS_SECRET`. Without it the run will fail
          # against protected previews; with it Playwright sends the token
          # via the `x-vercel-protection-bypass` header.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
