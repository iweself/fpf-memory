name: Vercel Spend Monitor

on:
  schedule:
    # Early warning for Function Duration burn. This complements the edge
    # firewall rule and code-level MCP GET guard that stop the known spike path.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      window_minutes:
        description: 'Metric lookback window in minutes'
        required: false
        default: '30'
      max_function_duration_gbhr:
        description: 'Maximum Function Duration GB-hours allowed in the window'
        required: false
        default: '0.25'

permissions:
  contents: read
  issues: write

concurrency:
  group: vercel-spend-monitor
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.5'
  FPF_VERCEL_PROJECT: fpf-sh
  FPF_VERCEL_SCOPE: team_CnO1I5xd2OS0lzbbc4RkW7Ym
  FPF_VERCEL_SPEND_WINDOW_MINUTES: ${{ github.event.inputs.window_minutes || '30' }}
  FPF_VERCEL_SPEND_MAX_FUNCTION_DURATION_GBHR: ${{ github.event.inputs.max_function_duration_gbhr || '0.25' }}
  FPF_VERCEL_SPEND_MAX_LEGACY_INVOCATIONS: '0'
  FPF_VERCEL_SPEND_MAX_ERROR_INVOCATIONS: '0'
  FPF_VERCEL_SPEND_LEGACY_PATH: /api/mcp/fpf_memory
  FPF_VERCEL_FUNCTION_DURATION_USD_PER_GBHR: '0.18'

jobs:
  monitor:
    name: Check Vercel spend guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Check Vercel spend guardrails
        id: spend
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is required for scheduled Vercel metrics monitoring."
            exit 1
          fi
          bun run monitor:vercel:spend -- --format markdown --fail-on-breach

      - name: Open or update spend breach issue
        if: steps.spend.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: Investigate Vercel spend monitor breach
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATE: ${{ steps.spend.outputs.state || 'unknown' }}
          SUMMARY: ${{ steps.spend.outputs.summary || 'Monitor failed before producing a summary.' }}
          FUNCTION_DURATION_GBHR: ${{ steps.spend.outputs.function_duration_gbhr || 'unknown' }}
          MAX_FUNCTION_DURATION_GBHR: ${{ steps.spend.outputs.max_function_duration_gbhr || env.FPF_VERCEL_SPEND_MAX_FUNCTION_DURATION_GBHR }}
          LEGACY_INVOCATIONS: ${{ steps.spend.outputs.legacy_function_invocations || 'unknown' }}
          ERROR_INVOCATIONS: ${{ steps.spend.outputs.function_error_invocations || 'unknown' }}
        run: |
          set -euo pipefail

          existing="$(
            gh issue list \
              --state open \
              --search "$TITLE in:title" \
              --json number \
              --jq '.[0].number // ""'
          )"

          body="$(
            printf '%s\n' \
              'The scheduled Vercel spend monitor failed or breached.' \
              '' \
              "- State: $STATE" \
              "- Summary: $SUMMARY" \
              "- Function Duration: $FUNCTION_DURATION_GBHR GB-hours (threshold $MAX_FUNCTION_DURATION_GBHR)" \
              "- Legacy route function invocations: $LEGACY_INVOCATIONS" \
              "- Function error-code invocations: $ERROR_INVOCATIONS" \
              "- Run: $RUN_URL" \
              '' \
              'Check the workflow summary for the full metric table before changing billing or deploy settings.'
          )"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$TITLE" --body "$body"
          fi

      - name: Fail workflow on spend breach
        if: steps.spend.outcome != 'success'
        run: exit 1
