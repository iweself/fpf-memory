#:schema https://developers.openai.com/codex/config-schema.json

[mcp_servers.fpf_memory]
command = "node"
args = ["--import", "tsx", "src/mcp-stdio.ts"]
cwd = "."
enabled_tools = [
  "ask_fpf",
  "query_fpf_spec",
  "read_fpf_doc",
  "trace_fpf_path",
  "get_fpf_index_status",
  "refresh_fpf_index",
]
required = false
startup_timeout_sec = 15
tool_timeout_sec = 60
